# ──────────────────────────────────────────────────────────────────────────────
# Nginx config for SRP AI Labs SmartRecruit Auth App
# Domain: app.srpailabs.com  →  localhost:3010 (Docker)
#
# Place this file at:
#   /etc/nginx/sites-available/app.srpailabs.com
# Then enable:
#   sudo ln -s /etc/nginx/sites-available/app.srpailabs.com \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL: run  certbot --nginx -d app.srpailabs.com
# ──────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name app.srpailabs.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS — main block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.srpailabs.com;

    # ── SSL (managed by Certbot / Let's Encrypt) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/app.srpailabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.srpailabs.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/srp-auth-access.log;
    error_log  /var/log/nginx/srp-auth-error.log;

    # ── Proxy to Next.js container ─────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;

        # Next.js — large uploads
        client_max_body_size 20m;
    }

    # ── Next.js static assets — long cache ───────────────────────────────
    location /_next/static/ {
        proxy_pass       http://127.0.0.1:3010;
        proxy_set_header Host $host;
        expires          1y;
        add_header       Cache-Control "public, immutable";
    }
}
